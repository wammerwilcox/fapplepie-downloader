name: Bump VERSION on Renovate merge

on:
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

jobs:
  bump-version:
    if: contains(github.event.head_commit.message, 'chore(deps):')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Determine update type and bump VERSION
        id: bump
        env:
          HEAD_COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          commit_msg="${HEAD_COMMIT_MESSAGE}"
          echo "Commit message: $commit_msg"

          # Default to patch
          update_type="patch"

          # Check for major indicators
          if echo "$commit_msg" | grep -qiE "(major|breaking|!)"; then
            update_type="major"
          # Check for minor indicators
          elif echo "$commit_msg" | grep -qiE "(feat|minor|update.*\\.[^0-9]*[0-9]+\\.0\\.0)"; then
            update_type="minor"
          fi

          echo "Detected update type: $update_type"

          current=$(cat VERSION)
          IFS=. read -r major minor patch <<< "$current"

          if [[ "$update_type" == "major" ]]; then
            new_version="$((major + 1)).0.0"
          elif [[ "$update_type" == "minor" ]]; then
            new_version="$major.$((minor + 1)).0"
          else
            new_version="$major.$minor.$((patch + 1))"
          fi

          echo "$new_version" > VERSION
          echo "new_version=${new_version}" >> "${GITHUB_OUTPUT}"
          echo "Bumped VERSION: $current -> $new_version"

      - name: Create version bump PR
        env:
          BRANCH_NAME: chore/bump-version-after-deps-${{ github.run_id }}
          GH_TOKEN: ${{ secrets.RENOVATE_TOKEN }}
          NEW_VERSION: ${{ steps.bump.outputs.new_version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "${BRANCH_NAME}"
          git add VERSION
          git commit -m "chore: bump VERSION to ${NEW_VERSION} after dependency update"
          git push "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "${BRANCH_NAME}"
          gh pr create \
            --title "chore: bump VERSION to ${NEW_VERSION} after dependency update" \
            --body "Bumps VERSION after a dependency update was merged into main." \
            --base main \
            --head "${BRANCH_NAME}"
