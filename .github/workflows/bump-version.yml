name: Bump VERSION on Renovate merge

on:
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

jobs:
  bump-version:
    if: contains(github.event.head_commit.message, 'chore(deps):')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Determine update type and bump VERSION
        id: bump
        env:
          HEAD_COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          commit_msg="${HEAD_COMMIT_MESSAGE}"
          echo "Commit message: $commit_msg"

          # Default to patch
          update_type="patch"

          # Check for major indicators
          if echo "$commit_msg" | grep -qiE "(major|breaking|!)"; then
            update_type="major"
          # Check for minor indicators
          elif echo "$commit_msg" | grep -qiE "(feat|minor|update.*\\.[^0-9]*[0-9]+\\.0\\.0)"; then
            update_type="minor"
          fi

          echo "Detected update type: $update_type"

          current=$(cat VERSION)
          IFS=. read -r major minor patch <<< "$current"

          if [[ "$update_type" == "major" ]]; then
            new_version="$((major + 1)).0.0"
          elif [[ "$update_type" == "minor" ]]; then
            new_version="$major.$((minor + 1)).0"
          else
            new_version="$major.$minor.$((patch + 1))"
          fi

          echo "$new_version" > VERSION
          echo "new_version=${new_version}" >> "${GITHUB_OUTPUT}"
          echo "Bumped VERSION: $current -> $new_version"

      - name: Create or update version bump PR
        env:
          BRANCH_NAME: chore/bump-version-after-deps
          GH_TOKEN: ${{ secrets.RENOVATE_TOKEN }}
          NEW_VERSION: ${{ steps.bump.outputs.new_version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -B "${BRANCH_NAME}" origin/main
          git add VERSION
          git commit -m "chore: bump VERSION to ${NEW_VERSION} after dependency update"
          git push --force-with-lease "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "${BRANCH_NAME}"

          title="chore: bump VERSION to ${NEW_VERSION} after dependency update"
          body="Bumps VERSION after a dependency update was merged into main."

          if pr_number="$(gh pr view "${BRANCH_NAME}" --json number --jq .number 2>/dev/null)"; then
            gh pr edit "${pr_number}" \
              --title "${title}" \
              --body "${body}"
          else
            gh pr create \
              --title "${title}" \
              --body "${body}" \
              --base main \
              --head "${BRANCH_NAME}"
            pr_number="$(gh pr view "${BRANCH_NAME}" --json number --jq .number)"
          fi

          gh pr merge "${pr_number}" --auto --squash --delete-branch
