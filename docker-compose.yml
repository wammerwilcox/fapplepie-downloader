services:
  fapplepie-downloader:
    # Use the versioned beta image from GitHub Container Registry.
    image: ghcr.io/wammerwilcox/fapplepie-downloader:2.0.0-beta.8
    # To build locally instead, use docker-compose.dev.yml.

    container_name: fapplepie-downloader

    # Mount volumes for persistent storage
    volumes:
      - ./app/downloads:/app/downloads
      - ./app/logs:/app/logs
      - ./app/cache:/app/cache
      - ./app/secrets:/app/secrets

    # Environment variables
    environment:
      # Cron schedule (default: 2 AM daily)
      # Format: minute hour day month weekday
      # Examples:
      #   0 2 * * *     - Daily at 2 AM
      #   0 */6 * * *   - Every 6 hours
      #   0 */12 * * *  - Every 12 hours
      CRON_SCHEDULE: "0 2 * * *"

      # Polite timing for scheduled scraper runs.
      # Manual one-shot runs start immediately.
      SCRAPE_START_DELAY_SECONDS: "0"
      SCRAPE_START_DELAY_JITTER_SECONDS: "1800"
      SCRAPE_DELAY_SECONDS: "1.0"
      SCRAPE_DELAY_JITTER_SECONDS: "0"
      SCRAPE_REDIRECT_DELAY_SECONDS: "1.0"
      SCRAPE_REDIRECT_DELAY_JITTER_SECONDS: "1.0"

      # Directories
      DOWNLOAD_DIR: /app/downloads
      LOG_DIR: /app/logs
      YT_DLP_JS_RUNTIMES: "${YT_DLP_JS_RUNTIMES:-deno}"
      YT_DLP_COOKIES_FILE: "${YT_DLP_COOKIES_FILE:-}"
      YT_DLP_COOKIES_FROM_BROWSER: "${YT_DLP_COOKIES_FROM_BROWSER:-}"

      # Optional outbound proxy for scraper + downloader traffic.
      # Leave values empty to use direct network routing.
      # Example:
      #   NORDVPN_PROXY=socks5h://nl.socks.nordhold.net:1080
      #   NORDVPN_USER=<service username>
      #   NORDVPN_PASS=<service password>
      NORDVPN_PROXY: "${NORDVPN_PROXY:-}"
      NORDVPN_USER: "${NORDVPN_USER:-}"
      NORDVPN_PASS: "${NORDVPN_PASS:-}"
      NORDVPN_PROXY_DOWNLOAD_DOMAINS: "${NORDVPN_PROXY_DOWNLOAD_DOMAINS:-}"

    # Restart policy
    restart: unless-stopped

    # Resource limits
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G
        reservations:
          cpus: "1"
          memory: 512M

    # Logging
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    # Keep container running
    stdin_open: true
    tty: true
